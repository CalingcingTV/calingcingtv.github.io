<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalincingTV - Beranda</title>
  <link rel="icon" href="assets/images/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <style>
    <style>
    #fullscreen-player {
      position: fixed;
      inset: 0;
      background-color: black;
      z-index: 50;
      display: none;
      flex-direction: column;
    }
    #fullscreen-player video {
      flex: 1;
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <nav class="bg-gray-800 p-4 shadow-lg sticky top-0 z-10">
      <div class="container max-w-6xl mx-auto flex flex-wrap justify-between items-center">
          <div class="text-xl font-bold text-red-400 mr-4 flex-shrink-0 mb-2 md:mb-0">CalincingTV</div>
          
          <div class="space-x-2 flex flex-wrap w-full md:w-auto md:space-x-4 justify-start">
              <a href="./" class="nav-link text-white hover:text-red-400 transition duration-300 whitespace-nowrap text-sm md:text-base px-1 py-0.5" data-page="home">Home</a>
              <a href="./?about" class="nav-link text-white hover:text-red-400 transition duration-300 whitespace-nowrap text-sm md:text-base px-1 py-0.5" data-page="about">Profil</a>
              <a href="./?harga" class="nav-link text-white hover:text-red-400 transition duration-300 whitespace-nowrap text-sm md:text-base px-1 py-0.5" data-page="harga">Plan/Harga</a>
              <a href="./?aktivasi" class="nav-link text-white hover:text-red-400 transition duration-300 whitespace-nowrap text-sm md:text-base px-1 py-0.5" data-page="aktivasi">Aktivasi</a>
          </div>
      </div>
  </nav>

  <div id="main-player-section" class="container max-w-6xl mx-auto p-4">
    <h1 class="text-3xl font-bold mb-4 text-center mt-4">CalingcingTV Web Player</h1>
    
    <div id="categories" class="flex flex-wrap gap-2 mb-6"></div>
    <div id="channel-list" class="flex overflow-x-auto gap-4 p-4 whitespace-nowrap"></div>
    <div id="player-container" class="bg-black p-4 mt-4 hidden">
      <div class="text-white mb-2 flex justify-between">
        <span id="player-title" class="font-semibold"></span>
        <button onclick="closePlayer()" class="bg-red-600 px-3 py-1 rounded">Tutup</button>
      </div>
      <video id="video-player" controls autoplay class="w-full h-64 md:h-96"></video>
    </div>
    <h1 class="text-center font-bold mb-4">Untuk menikmati lebih banyak Channel silahkan gunakan aplikasi CalingcingTV</h1>
  </div>

  <div id="dynamic-content" class="container max-w-6xl mx-auto p-4 hidden"></div>

  <script src="page.js"></script>
  <script src="player.js"></script>
</body>
</html>
