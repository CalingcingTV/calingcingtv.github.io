<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalincingTV - Beranda</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <style>
    #fullscreen-player {
      position: fixed;
      inset: 0;
      background-color: black;
      z-index: 50;
      display: none;
      flex-direction: column;
    }
    #fullscreen-player video {
      flex: 1;
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <nav class="bg-gray-800 p-4 shadow-lg sticky top-0 z-10">
    <div class="container max-w-6xl mx-auto flex justify-between items-center">
      <div class="text-xl font-bold text-red-400">CalincingTV</div>
      <div class="space-x-4 flex overflow-x-auto">
        <a href="/" class="text-white hover:text-red-400 transition duration-300 whitespace-nowrap">Home</a>
        <a href="/about.html" class="text-white hover:text-red-400 transition duration-300 whitespace-nowrap">Profil</a>
        <a href="/download-apk.html" class="text-white hover:text-red-400 transition duration-300 whitespace-nowrap">Download APK</a>
        <a href="/harga.html" class="text-white hover:text-red-400 transition duration-300 whitespace-nowrap">Plan/Harga</a>
      </div>
    </div>
  </nav>
  <div class="container max-w-6xl mx-auto p-4">
    <h1 class="text-3xl font-bold mb-4 text-center mt-4">CalingcingTV Web Player</h1>

    <div id="categories" class="flex flex-wrap gap-2 mb-6"></div>
    <div id="channel-list" class="flex overflow-x-auto gap-4 p-4 whitespace-nowrap"></div>
    <div id="player-container" class="bg-black p-4 mt-4 hidden">
      <div class="text-white mb-2 flex justify-between">
        <span id="player-title" class="font-semibold"></span>
        <button onclick="closePlayer()" class="bg-red-600 px-3 py-1 rounded">Tutup</button>
      </div>
      <video id="video-player" controls autoplay class="w-full h-64 md:h-96"></video>
    </div>
    <h1 class="text-center font-bold mb-4">Untuk menikmati lebih banyak Channel silahkan gunakan aplikasi CalingcingTV</h1>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="player.js"></script>
</body>
</html>
